# Mosquitto config for the bench MVP.
#
# WARNING: anonymous access is enabled because MVP assumes a trusted local
# bench network. Do NOT expose this broker to a shared/untrusted LAN as-is.
# Before going beyond MVP, set allow_anonymous false and enable password_file
# and acl_file below.

persistence true
persistence_location /mosquitto/data/
autosave_interval 30

log_dest stdout
log_type error
log_type warning
log_type notice

listener 1883
allow_anonymous true

# Future hardening (uncomment when ready):
# allow_anonymous false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl
