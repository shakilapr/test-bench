name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build firmware
        run: pio run --project-dir firmware
      - name: Run native firmware tests
        run: pio test -e native --project-dir firmware

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Lint backend
        run: npm --workspace backend run lint
      - name: Lint UI
        run: npm --workspace ui run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: In-process e2e (no Docker)
        run: npm run test:e2e
