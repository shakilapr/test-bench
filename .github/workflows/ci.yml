name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build firmware
        run: pio run
      - name: Run native firmware tests
        run: pio test -e native

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run test:integration

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    needs: [backend, ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Start infra
        run: docker compose -f infra/docker-compose.dev.yml up -d
      - name: Wait for services
        run: sleep 10
      - name: Install backend
        run: cd backend && npm ci && npm run build
      - name: Install UI
        run: cd ui && npm ci && npm run build
      - name: Start backend
        run: cd backend && node dist/index.js &
        env:
          NODE_ENV: production
          PORT: 3000
          MQTT_URL: mqtt://localhost:1883
          INFLUX_URL: http://localhost:8086
          INFLUX_TOKEN: dev-token
          INFLUX_ORG: bench
          INFLUX_BUCKET: bench
          SQLITE_PATH: ./data/bench.sqlite
          GRAFANA_URL: http://localhost:3001
      - name: Run Playwright
        run: cd ui && npx playwright install --with-deps chromium && npm run test:e2e
