[env:esp32-s3-devkitc-1]
platform = espressif32 @ 6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_protocol = esptool
monitor_speed = 115200

; Windows:
;   Set both ports to your device COM port before upload/monitor, for example COM5.
; upload_port = COM5
; monitor_port = COM5
;
; Linux examples kept commented out for reference only:
; upload_port = /dev/ttyACM0
; monitor_port = /dev/ttyACM0

build_flags =
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.4.0
